version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing dependencies..."
      - pip install -r pipelines/lambda/requirements.txt -t pipelines/lambda/lib
  build:
    commands:
      - echo "Zipping deployment package..."
      # Anchor to the root directory for every command
      - cd $CODEBUILD_SRC_DIR/pipelines/lambda/lib && zip -r9 ../deployment_package.zip .
      - cd $CODEBUILD_SRC_DIR/pipelines/lambda && zip -g deployment_package.zip handler.py
      - cd $CODEBUILD_SRC_DIR/pipelines/lambda && zip -gr deployment_package.zip fetch_sources/
  post_build:
    commands:
      - echo "Updating Lambda Function..."
      # Anchor to root before running the AWS CLI command
      - cd $CODEBUILD_SRC_DIR
      - aws lambda update-function-code --function-name hf-approval-forecasting-lambda --zip-file fileb://pipelines/lambda/deployment_package.zip
      - echo "DONE!!"